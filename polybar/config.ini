;==========================================================

;==========================================================
; Colors
;==========================================================

[colors]
background = #1a1b26
background-alt = #24283b
foreground = #c0caf5
primary = #7aa2f7
secondary = #bb9af7
alert = #f7768e
disabled = #565f89
success = #9ece6a
warning = #e0af68

;==========================================================
; Bar Configuration
;==========================================================

[bar/main]
width = 100%
height = 28pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"
font-2 = "Noto Color Emoji:scale=10;2"

modules-left = xworkspaces xwindow
modules-center = date
modules-right = ${env:POLYBAR_MODULES_RIGHT:pulseaudio memory cpu wlan}

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = generic

;==========================================================
; Modules
;==========================================================

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįēĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ůįĖĀ muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįćõ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ůįĽ† "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = ${env:POLYBAR_BATTERY:BAT0}
adapter = ${env:POLYBAR_ADAPTER:AC}

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <animation-low> <label-low>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
label-low = %percentage%%

ramp-capacity-0 = ůįāé
ramp-capacity-1 = ůįĀļ
ramp-capacity-2 = ůįĀĽ
ramp-capacity-3 = ůįĀľ
ramp-capacity-4 = ůįĀĹ
ramp-capacity-5 = ůįĀĺ
ramp-capacity-6 = ůįĀŅ
ramp-capacity-7 = ůįāÄ
ramp-capacity-8 = ůįāĀ
ramp-capacity-9 = ůįāā
ramp-capacity-10 = ůįĀĻ
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = ůįĘú
animation-charging-1 = ůįāÜ
animation-charging-2 = ůįāá
animation-charging-3 = ůįāą
animation-charging-4 = ůįĘĚ
animation-charging-5 = ůįāČ
animation-charging-6 = ůįĘě
animation-charging-7 = ůįāä
animation-charging-8 = ůįāč
animation-charging-9 = ůįāÖ
animation-charging-foreground = ${colors.success}
animation-charging-framerate = 750

animation-low-0 = ůįāé
animation-low-1 = ůįĀļ
animation-low-foreground = ${colors.alert}
animation-low-framerate = 500

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5

format-connected = <ramp-signal> <label-connected>
label-connected = %essid%

format-disconnected = <label-disconnected>
label-disconnected = ůį§≠ disconnected
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = ůį§Į
ramp-signal-1 = ůį§ü
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§•
ramp-signal-4 = ůį§®
ramp-signal-foreground = ${colors.primary}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
