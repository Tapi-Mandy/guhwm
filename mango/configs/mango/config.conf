# === Keybindings ===
# Key name refers to `xev` or `wev` command outputs
# Mod Keys: SUPER, CTRL, ALT, SHIFT, NONE

# --- Reload Config ---
bind=ALT+SHIFT, r, reload_config

# --- Launcher & Terminal ---
bind=ALT, P, spawn_shell, rofi -show drun || pkill rofi
bind=ALT, Return, spawn, foot 

# --- Browser ---
bind=ALT, W, spawn, firefox

# --- File Manager ---
bind=ALT, E, spawn, foot -e yazi

# --- Toggle SwayNC Menu ---
bind=ALT+SHIFT, A, spawn, swaync-client -t

# --- guhShot ---
bind=NONE, Print, spawn, guhshot --full
bind=SHIFT, Print, spawn, guhshot --select

# --- Shortcut config.conf ---
bind=ALT+SHIFT, C, spawn, foot -e nano /home/$USER/.config/mango/config.conf

# Switch Window Focus (Primary use of ALT)
bind=ALT, Tab, focusstack, next
bind=ALT, Left, focusdir, left
bind=ALT, Right, focusdir, right
bind=ALT, Up, focusdir, up
bind=ALT, Down, focusdir, down

# Swap Window (Changed from SUPER+SHIFT to ALT+SHIFT)
bind=ALT+SHIFT, Up, exchange_client, up
bind=ALT+SHIFT, Down, exchange_client, down
bind=ALT+SHIFT, Left, exchange_client, left
bind=ALT+SHIFT, Right, exchange_client, right

# Switch Window Status (Use SUPER for toggle actions)
bind=SUPER, g, toggleglobal,
bind=ALT, Tab, toggleoverview,
bind=SUPER, Q, togglefloating,
bind=ALT, a, togglemaximizescreen,
bind=SUPER, f, togglefullscreen,
bind=SUPER+SHIFT, f, togglefakefullscreen,
bind=SUPER, i, minimized,
bind=SUPER, o, toggleoverlay,
bind=SUPER+SHIFT, I, restore_minimized
bind=ALT, z, toggle_scratchpad

# Scroller Layout
bind=ALT, e, set_proportion, 1.0
bind=ALT, x, switch_proportion_preset,

# Switch Layout
bind=ALT, n, switch_layout  <-- Changed from SUPER to ALT
#ts toggles float mode
bind=SUPER, z, spawn, /home/$USER/.config/mango/scripts/toggle-float-mode.sh <-- Kept on SUPER to avoid conflict with ALT, z

# Tag Switch (SUPER + Arrows for view switching)
bind=SUPER, Left, viewtoleft, 0
bind=CTRL, Left, viewtoleft_have_client, 0
bind=SUPER, Right, viewtoright, 0
bind=CTRL, Right, viewtoright_have_client, 0
bind=CTRL+SUPER, Left, tagtoleft, 0
bind=CTRL+SUPER, Right, tagtoright, 0

# Tag View (Switch to a tag/workspace)
bind=SUPER, 1, view, 1, 0
bind=SUPER, 2, view, 2, 0
bind=SUPER, 3, view, 3, 0
bind=SUPER, 4, view, 4, 0
bind=SUPER, 5, view, 5, 0
bind=SUPER, 6, view, 6, 0
bind=SUPER, 7, view, 7, 0
bind=SUPER, 8, view, 8, 0
bind=SUPER, M, view, 9, 0

# Tag: move client to the tag and focus it (ALT + Number)
# Tagsilent: move client to the tag and without focus
# bind=ALT, 1, tagsilent, 1  <-- Uncomment/use if preferred
bind=ALT+SHIFT, 1, tag, 1, 0
bind=ALT+SHIFT, 2, tag, 2, 0  <-- Changed from ALT to ALT+SHIFT to prevent conflict with view
bind=ALT+SHIFT, 3, tag, 3, 0  <-- Changed from ALT to ALT+SHIFT
bind=ALT+SHIFT, 4, tag, 4, 0  <-- Changed from ALT to ALT+SHIFT
bind=ALT+SHIFT, 5, tag, 5, 0  <-- Changed from ALT to ALT+SHIFT
bind=ALT+SHIFT, 6, tag, 6, 0  <-- Changed from ALT to ALT+SHIFT
bind=ALT+SHIFT, 7, tag, 7, 0  <-- Changed from ALT to ALT+SHIFT
bind=ALT+SHIFT, 8, tag, 8, 0  <-- Changed from ALT to ALT+SHIFT
bind=SUPER+SHIFT, M, tag, 9, 0

# Monitor Switch (Kept on ALT+SHIFT and SUPER+ALT)
bind=ALT+SHIFT, Left, focusmon, left
bind=ALT+SHIFT, Right, focusmon, right
bind=SUPER+ALT, Left, tagmon, left
bind=SUPER+ALT, Right, tagmon, right

# Gaps
bind=ALT+SHIFT, X, incgaps, 1
bind=ALT+SHIFT, Z, incgaps, -1
bind=ALT+SHIFT, R, togglegaps

# Movewin
bind=CTRL+SHIFT, Up, movewin, +0, -50
bind=CTRL+SHIFT, Down, movewin, +0, +50
bind=CTRL+SHIFT, Left, movewin, -50, +0
bind=CTRL+SHIFT, Right, movewin, +50, +0

# Resizewin
bind=CTRL+ALT, Up, resizewin, +0, -50
bind=CTRL+ALT, Down, resizewin, +0, +50
bind=CTRL+ALT, Left, resizewin, -50, +0
bind=CTRL+ALT, Right, resizewin, +50, +0

# Mouse Button Bindings (Kept on SUPER as per original, or can be changed to ALT if preferred)
mousebind=SUPER, btn_left, moveresize, curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER, btn_right, moveresize, curresize
mousebind=NONE, btn_left, toggleoverview, 1
mousebind=NONE, btn_right, killclient, 0

# === Axis Bindings ===
axisbind=SUPER, UP, viewtoleft_have_client
axisbind=SUPER, DOWN, viewtoright_have_client

# Layer Rule
layerrule=animation_type_open:slide,layer_name:rofi
layerrule=animation_type_close:slide,layer_name:rofi
# layerrule=noanim:1,layer_name:waybar
# windowrule = rounding 10, waybar
# layerrule=noblur:1,layer_name:waybar
# layerrule=border_radius=10,layer_name:Waybar
# windowrule=isfloating=1,

windowrule=tags:9,appid:Spotify
windowrule=isfloating:1,appid:Spotify
windowrule=width:1000,height:600,appid:.Spotify

windowrule=isfloating:1,appid:zen
windowrule=width:1000,height:600,appid:zen

source = ./float.conf
